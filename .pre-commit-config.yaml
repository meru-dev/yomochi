repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
        args: [app/, tests/]

      - id: import-linter
        name: import-linter
        entry: uv run lint-imports
        language: system
        pass_filenames: false

      - id: deptry
        name: deptry
        entry: uv run deptry
        language: system
        pass_filenames: false
        args: [.]

      - id: slotscheck
        name: slotscheck
        entry: uv run slotscheck
        language: system
        pass_filenames: false
        args: [-m, app]
