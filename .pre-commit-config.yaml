repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
        args: [app/, tests/]

      - id: import-linter
        name: import-linter
        entry: uv run lint-imports
        language: system
        pass_filenames: false

      - id: deptry
        name: deptry
        entry: uv run deptry
        language: system
        pass_filenames: false
        args: [.]

      - id: slotscheck
        name: slotscheck
        entry: uv run slotscheck
        language: system
        pass_filenames: false
        args: [-m, app]

      - id: openapi-schema
        name: openapi-schema (regenerate web schema.d.ts)
        entry: scripts/generate_openapi_schema.sh
        language: script
        pass_filenames: false
        files: '^(app/.*\.py|web/src/lib/api/schema\.d\.ts)$'
