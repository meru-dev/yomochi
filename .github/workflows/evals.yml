name: Evals (PR snapshot)

on:
  pull_request:
    paths:
      - 'app/outbound/adapters/openai/**'
      - 'app/application/insights/**'
      - 'app/application/search/**'
      - 'app/application/transactions/use_cases/voice_*'
      - 'tests/evals/**'
      - 'scripts/bootstrap_evals.py'

env:
  UV_CACHE_DIR: /tmp/.uv-cache

jobs:
  evals-snapshot:
    name: Evals (snapshot mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --all-groups --frozen
      - name: Run evals in snapshot mode
        id: run-evals
        run: |
          set -o pipefail
          uv run pytest -m evals tests/evals/ -q --no-cov | tee evals-output.txt
        # Capture output for the comment below; the explicit gate step blocks.
        # Snapshot mode is hermetic (replays tests/evals/snapshots/ — no live key),
        # so this gate is deterministic and safe to make merge-blocking.
        continue-on-error: true
      - name: Post comment on threshold breach
        if: steps.run-evals.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('evals-output.txt', 'utf8');
            const tail = output.length > 3000 ? '…(truncated)\n' + output.slice(-3000) : output;
            const body = "❌ Evals snapshot regression — this PR is blocked until the threshold passes (or snapshots are intentionally updated).\n\n```\n" + tail + "\n```";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
      - name: Fail the job on eval regression (merge gate)
        if: steps.run-evals.outcome == 'failure'
        run: |
          echo "Evals snapshot threshold breached — see PR comment. Blocking merge."
          exit 1
