server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Tail every Docker container on this host. The Docker SD driver writes JSON
  # log files at /var/lib/docker/containers/<id>/<id>-json.log; structlog inside
  # the app writes one JSON object per line, so we re-parse that nested JSON.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Compose service name → `service` label (low cardinality, ~10 values).
      # Labels must stay low-cardinality; trace_id stays in the line as a field.
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
    pipeline_stages:
      # Docker log driver wraps each line: {"log": "<app line>\n", "stream": "stdout", "time": "..."}
      - json:
          expressions:
            log: log
            stream: stream
            time: time
      - timestamp:
          source: time
          format: RFC3339Nano
      - labels:
          stream:
      - output:
          source: log
      # Inner structlog JSON. Extract `level` (label, low cardinality) and `service.name`
      # if present (overrides compose label for app processes). Keep trace_id off labels.
      - json:
          expressions:
            level: level
            service_name: '"service.name"'
      - labels:
          level:
          service_name:
