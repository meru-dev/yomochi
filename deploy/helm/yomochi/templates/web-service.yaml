apiVersion: v1
kind: Service
metadata:
  name: {{ include "yomochi.fullname" . }}-web
  labels:
    {{- include "yomochi.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    {{- include "yomochi.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
