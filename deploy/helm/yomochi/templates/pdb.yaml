{{- if gt (int .Values.api.replicaCount) 1 }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "yomochi.fullname" . }}-api
  labels:
    {{- include "yomochi.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "yomochi.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
{{- end }}
