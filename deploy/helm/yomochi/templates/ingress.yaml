{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "yomochi.fullname" . }}
  labels:
    {{- include "yomochi.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          # API service — all versioned routes + ops endpoints
          - path: /v1/
            pathType: Prefix
            backend:
              service:
                name: {{ include "yomochi.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          - path: /health
            pathType: Exact
            backend:
              service:
                name: {{ include "yomochi.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          - path: /ready
            pathType: Exact
            backend:
              service:
                name: {{ include "yomochi.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          - path: /openapi.json
            pathType: Exact
            backend:
              service:
                name: {{ include "yomochi.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          # /metrics is NOT exposed — access only via NetworkPolicy-restricted pod-to-pod
          # Web service — catch-all (must be last)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "yomochi.fullname" $ }}-web
                port:
                  number: 3000
    {{- end }}
{{- end }}
